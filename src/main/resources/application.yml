cloud:
  aws:
    region:
      static: ap-northeast-2
    s3:
      bucket: rsp-profile-pictures
      public-url: ${S3_PUBLIC_URL}

spring:
  application:
    name: rsp-battle

  jackson:
    time-zone: UTC

  jpa:
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - profile
              - email
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: sub

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when_authorized
    prometheus:
      enabled: true
  metrics:
    tags:
      application: rsp-battle

server:
  shutdown: graceful

app:
  auth:
    access-token-expire-millis: 1800000
    refresh-token-expire-millis: 604800000

jwt:
  secret: ${JWT_SECRET}

frontend:
  url: ${FRONTEND_URL}
