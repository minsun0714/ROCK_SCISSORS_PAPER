services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rsp-app
    expose:
      - "8080"
    env_file:
      - .env.prod
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    restart: always

  redis:
    image: redis:7
    container_name: rsp-redis
    command: redis-server --appendonly yes --requirepass ${SPRING_REDIS_PASSWORD}
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis-data:/data
    restart: always

  nginx:
    image: nginx:1.25-alpine
    container_name: rsp-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - app
    restart: always

  # =========================
  # Exporters
  # =========================

  node-exporter:
    image: prom/node-exporter
    container_name: rsp-node-exporter
    expose:
      - "9100"
    restart: always

  redis-exporter:
    image: oliver006/redis_exporter
    container_name: rsp-redis-exporter
    environment:
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=${SPRING_REDIS_PASSWORD}
    expose:
      - "9121"
    depends_on:
      - redis
    restart: always

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter
    container_name: rsp-nginx-exporter
    command:
      - -nginx.scrape-uri=http://nginx:80/stub_status
    expose:
      - "9113"
    depends_on:
      - nginx
    restart: always

  certbot:
    image: certbot/certbot
    profiles: ["prod"]
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot

volumes:
  redis-data: